<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOHA STORE DZ | الدفع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="brand">
          <span class="brand-mark">MS</span>
          <span>MOHA STORE DZ</span>
        </a>
        <div class="nav-actions">
          <a href="index.html" class="btn-back-home" aria-label="عودة للرئيسية">← الرئيسية</a>
          <button class="theme-toggle" id="theme-toggle" aria-label="تبديل الوضع الليلي">◐</button>
        </div>
      </div>
    </header>

    <main class="container page-content checkout-page">
      <div class="checkout-card">
        <h1>إتمام الدفع</h1>
        <form id="checkout-form" class="auth-form">
          <input type="text" placeholder="الاسم الكامل" required />
          <input type="text" placeholder="العنوان" required />
          <input type="text" placeholder="رقم الهاتف" required />
          <select required>
            <option value="">اختر طريقة الدفع</option>
            <option value="card">بطاقة ائتمان</option>
            <option value="cash">الدفع عند الاستلام</option>
          </select>
          <button class="btn btn-primary full-width" type="submit">تأكيد الطلب</button>
        </form>
        <p class="form-message" id="checkout-message"></p>
      </div>
      <aside class="checkout-summary">
        <h3>ملخص الطلب</h3>
        <div id="checkout-items"></div>
        <div class="summary-row total"><span>الإجمالي</span><strong id="checkout-total">0.00 ر.س</strong></div>
      </aside>
    </main>

    <nav class="bottom-nav" aria-label="شريط التنقل السفلي">
      <a href="index.html" class="bn-item" aria-label="الرئيسية">🏠<span>الرئيسية</span></a>
      <a href="products.html" class="bn-item" aria-label="المنتجات">🛍️<span>منتجات</span></a>
      <a href="cart.html" class="bn-item" aria-label="السلة">🛒<span>السلة</span></a>
    </nav>
    <script src="js/app.js"></script>
  </body>
</html>
