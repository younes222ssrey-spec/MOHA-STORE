<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOHA STORE DZ | تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="brand">
          <span class="brand-mark">MS</span>
          <span>MOHA STORE DZ</span>
        </a>
        <div class="nav-actions">
          <a href="index.html" class="btn-back-home" aria-label="عودة للرئيسية">← الرئيسية</a>
          <button class="theme-toggle" id="theme-toggle" aria-label="تبديل الوضع الليلي">◐</button>
        </div>
      </div>
    </header>

    <main class="container auth-page">
      <div class="auth-card">
        <h1>إنشاء حساب أو تسجيل دخول</h1>
        <form id="auth-form" class="auth-form">
          <input type="email" id="auth-email" placeholder="البريد الإلكتروني" required />
          <input type="password" id="auth-password" placeholder="كلمة المرور" required />
          <button class="btn btn-primary full-width" type="submit">متابعة</button>
        </form>
        <p class="form-message" id="auth-message"></p>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="شريط التنقل السفلي">
      <a href="index.html" class="bn-item" aria-label="الرئيسية">🏠<span>الرئيسية</span></a>
      <a href="products.html" class="bn-item" aria-label="المنتجات">🛍️<span>منتجات</span></a>
      <a href="cart.html" class="bn-item" aria-label="السلة">🛒<span>السلة</span></a>
      <a href="auth.html" class="bn-item active" aria-label="حسابي">👤<span>حسابي</span></a>
    </nav>
    <script src="js/app.js"></script>
  </body>
</html>
