<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="brand">
          <span class="brand-mark">MS</span>
          <span>MOHA STORE DZ</span>
        </a>
        <nav class="nav-links">
          <a href="index.html">الرئيسية</a>
          <a href="products.html" class="active">المنتجات</a>
          <a href="index.html#offers">العروض</a>
          <a href="index.html#about">من نحن</a>
          <a href="index.html#contact">اتصل بنا</a>
          <a href="cart.html">السلة <span class="cart-count" id="cart-count">0</span></a>
        </nav>
        <div class="nav-actions">
          <a href="index.html" class="btn-back-home" aria-label="عودة للرئيسية">← الرئيسية</a>
          <button class="theme-toggle" id="theme-toggle" aria-label="تبديل الوضع الليلي">◐</button>
        </div>
      </div>
    </header>

    <main class="container page-content">
      <section class="section-heading">
        <p class="eyebrow">تسوق بسهولة</p>
        <h1>اكتشف جميع المنتجات</h1>
      </section>

      <div class="filters-bar">
        <input id="search-input" type="search" placeholder="ابحث عن منتج..." />
        <select id="category-filter">
          <option value="all">الكل</option>
          <option value="men">رجال</option>
          <option value="women">نساء</option>
          <option value="kids">أطفال</option>
          <option value="shoes">أحذية</option>
          <option value="accessories">إكسسوارات</option>
        </select>
      </div>

      <div class="product-grid" id="products-grid"></div>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div>
          <a href="index.html" class="brand">
            <span class="brand-mark">E</span>
            <span>Elegance Store</span>
          </a>
          <p>تصميم عصري ومستلهم من العلامات العالمية في مجال الأزياء.</p>
        </div>
      </div>
    </footer>

    <div class="toast" id="toast"></div>
    <nav class="bottom-nav" aria-label="شريط التنقل السفلي">
      <a href="index.html" class="bn-item" aria-label="الرئيسية">🏠<span>الرئيسية</span></a>
      <a href="products.html" class="bn-item active" aria-label="المنتجات">🛍️<span>منتجات</span></a>
      <a href="cart.html" class="bn-item" aria-label="السلة">🛒<span>السلة</span></a>
      <a href="auth.html" class="bn-item" aria-label="حسابي">👤<span>حسابي</span></a>
